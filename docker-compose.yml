services:
  apk-rebirth:
    build:
      context: .
      dockerfile: Dockerfile
    image: apk-rebirth:latest
    container_name: apk-rebirth
    restart: unless-stopped
    ports:
      - "${HOST_PORT:-8080}:8080"
    environment:
      # Override any of these as needed. See application.properties for the full list.
      SERVER_PORT: "8080"
      MAX_FILE_SIZE: "500MB"
      MAX_REQUEST_SIZE: "500MB"
      JOB_TTL_MINUTES: "60"
      JAVA_OPTS: "-XX:MaxRAMPercentage=75.0 -Djava.awt.headless=true"
    volumes:
      - apk-rebirth-workspace:/app/workspace
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:8080/ >/dev/null 2>&1 || exit 1"]
      interval: 30s
      timeout: 5s
      start_period: 20s
      retries: 3

volumes:
  apk-rebirth-workspace:
