# ─── Server ────────────────────────────────────────────────
server.port=${SERVER_PORT:8080}
server.address=${SERVER_ADDRESS:0.0.0.0}

# ─── Upload limits ─────────────────────────────────────────
spring.servlet.multipart.max-file-size=${MAX_FILE_SIZE:500MB}
spring.servlet.multipart.max-request-size=${MAX_REQUEST_SIZE:500MB}

# ─── APK Rebirth ───────────────────────────────────────────
# Pinned tool versions (auto-downloaded on first run if missing).
apk-rebirth.apktool-version=${APKTOOL_VERSION:2.11.1}
apk-rebirth.uber-signer-version=${UBER_SIGNER_VERSION:1.3.0}

# Paths can be absolute or relative to the working directory.
apk-rebirth.apktool-path=${APKTOOL_PATH:apktool.jar}
apk-rebirth.uber-signer-path=${UBER_SIGNER_PATH:uber-apk-signer.jar}

# Where processing happens and result files live. Empty = system temp dir.
apk-rebirth.workspace=${APK_REBIRTH_WORKSPACE:}

# Minutes to keep finished jobs + files before auto-cleanup.
apk-rebirth.job-ttl-minutes=${JOB_TTL_MINUTES:60}
apk-rebirth.cleanup-interval-ms=${CLEANUP_INTERVAL_MS:300000}
